# 每天 GMT+8 08:00 在 GitHub 上跑 feeds/run_all.py,把更新的 CSV 提交回仓库。
# 依赖:仓库 Settings → Secrets and variables → Actions → 新建 secret `FRED_API_KEY`,
#      `CENSUS_API_KEY`。
# 手动触发:Actions 页 → feeds-daily → Run workflow(首次先手动跑一次,验证各源对云 IP 的态度)。
name: feeds-daily

on:
  schedule:
    # 错开整点:GitHub Actions 的 scheduled 触发在整点(尤其 :00)排队最重、延迟最久,
    # 故用 00:17 UTC = GMT+8 08:17。注意 schedule 本身不保证准时(高负载会延迟甚至偶尔跳过)。
    - cron: "17 0 * * *"      # UTC 00:17 = GMT+8 08:17,固定墙钟时间,不跟随美东冬夏令时
  workflow_dispatch:
  push:
    paths:                    # feeds 代码变更即自动跑一轮验证(Actions 的数据提交只
      - "feeds/**"            # 碰 data/,不会触发自身,无循环)
      - "!feeds/**.md"        # 纯文档变更不值得空跑 30 个模块
      - ".github/workflows/feeds.yml"

permissions:
  contents: write

concurrency:
  group: feeds-daily
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5

      - name: 跑全部 feeds(逐个容错,任一失败本步标红但不影响提交)
        id: run
        continue-on-error: true
        env:
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
          CENSUS_API_KEY: ${{ secrets.CENSUS_API_KEY }}
        run: uv run feeds/run_all.py

      - name: 提交并推送数据变更(成功的模块照常落地)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          if git diff --staged --quiet; then
            echo "无数据变更,跳过提交"
          else
            git commit -m "data: daily feeds refresh $(date -u +%F)"
            git push
          fi

      - name: 如有模块失败则让任务标红
        if: steps.run.outcome == 'failure'
        run: exit 1
